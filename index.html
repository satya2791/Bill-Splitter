<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Splitter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <p class="tagline">One bill, many friends, zero confusion</p>

        <h1 class="title">Bill Splitter</h1>

        <div class="card">

            <div class="header">
                Bill Calculator
            </div>

            <div class="form-group">
                <label for="person">No. of Persons:</label>
                <input type="number" id="person" placeholder="Enter persons" style="font-weight: bold;">
            </div>

            <div class="form-group">
                <label for="amount">Total Amount:</label>
                <input type="number" id="amount" placeholder="Enter amount" style="font-weight: bold;">
            </div>

            <div class="form-group">
                <label for="percentage">Percentage of Tip:</label>
                <input type="number" id="percentage" placeholder="Tip %" style="font-weight: bold;">
            </div>

            <button class="start-btn">Start</button>

            <div id="output"></div>

        </div>

    </div>

    <script src="index.js"></script>

</body>
</html>
